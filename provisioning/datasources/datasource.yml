apiVersion: 1

datasources:
  - name: TestData DB
    type: testdata
    uid: testdata
    access: proxy

  # Infinity — production Grafana REST API proxy
  - name: Production Grafana API
    type: yesoreyeram-infinity-datasource
    uid: prod-grafana-infinity
    isDefault: false
    access: proxy
    jsonData:
      auth_method: bearerToken
      allowedHosts:
        - https://grafana.mcoreops.com
    secureJsonData:
      bearerToken: ${GRAFANA_API_TOKEN}

  # Prometheus — proxied through production Grafana
  - name: Production Prometheus
    type: prometheus
    uid: prod-prometheus
    isDefault: true
    access: proxy
    url: https://grafana.mcoreops.com/api/datasources/proxy/uid/prometheus
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer ${GRAFANA_API_TOKEN}

  # New Relic — direct Infinity datasource with NR API key
  - name: New Relic
    type: yesoreyeram-infinity-datasource
    uid: nr-infinity
    access: proxy
    jsonData:
      auth_method: apiKey
      apiKeyKey: API-Key
      apiKeyType: header
      allowedHosts:
        - https://api.newrelic.com
    secureJsonData:
      apiKeyValue: ${NR_API_KEY}

  # CloudWatch — direct with AWS credentials
  - name: AWS CloudWatch
    type: cloudwatch
    uid: local-cloudwatch
    access: proxy
    jsonData:
      authType: keys
      defaultRegion: ap-east-1
    secureJsonData:
      accessKey: ${AWS_ACCESS_KEY}
      secretKey: ${AWS_SECRET_KEY}

  # CLD Kibana (Sportsbook logs) — direct Infinity
  - name: CLD Kibana SB
    type: yesoreyeram-infinity-datasource
    uid: cld-kibana-infinity
    access: proxy
    jsonData:
      auth_method: basicAuth
      allowedHosts:
        - https://cld-kibana.mansion88.net
    secureJsonData:
      basicAuthPassword: ${CLD_KIBANA_PASSWORD}
    basicAuth: true
    basicAuthUser: SRE-ADMIN
