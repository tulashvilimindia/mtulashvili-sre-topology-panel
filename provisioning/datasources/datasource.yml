apiVersion: 1

datasources:
  - name: TestData DB
    type: testdata
    uid: testdata
    access: proxy

  # Infinity datasource — connects to production Grafana REST API
  # Allows querying any endpoint on grafana.mcoreops.com (datasources, dashboards, etc.)
  - name: Production Grafana API
    type: yesoreyeram-infinity-datasource
    uid: prod-grafana-infinity
    isDefault: false
    access: proxy
    jsonData:
      auth_method: bearerToken
      allowedHosts:
        - https://grafana.mcoreops.com
    secureJsonData:
      bearerToken: ${GRAFANA_API_TOKEN}

  # Prometheus datasource — proxied through production Grafana's datasource proxy
  # Gives native PromQL support for windows_exporter metrics (PP01-PP06 CPU, RAM, IIS)
  - name: Production Prometheus
    type: prometheus
    uid: prod-prometheus
    isDefault: true
    access: proxy
    url: https://grafana.mcoreops.com/api/datasources/proxy/uid/prometheus
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer ${GRAFANA_API_TOKEN}
